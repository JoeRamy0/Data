<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>استبيان تقييم استخدام الهاتف</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Tahoma', 'Cairo', 'Roboto', sans-serif;
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.6);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .survey-card {
            padding: 1.8rem 1.5rem 2rem;
        }

        /* مساحة مخصصة لإضافة الصور المحلية */
        .local-photo-area {
            text-align: center;
            margin-bottom: 25px;
            padding: 15px 10px;
            background: rgba(0, 0, 0, 0.02);
            border-radius: 32px;
            border: 2px dashed #0077b6;
            transition: all 0.3s;
        }
        
        .local-photo-area:hover {
            background: rgba(0, 119, 182, 0.05);
            border-color: #ff6b6b;
        }
        
        .photo-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .photo-card {
            position: relative;
            width: 120px;
            border-radius: 20px;
            overflow: hidden;
            background: white;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        
        .photo-card:hover {
            transform: scale(1.02);
        }
        
        .photo-card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
            display: block;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-area h1 {
            font-size: 1.6rem;
            color: #1a2c3e;
            font-weight: 800;
        }

        .input-group {
            margin-bottom: 22px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #0f2b3d;
            font-size: 0.95rem;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 14px 18px;
            font-size: 1rem;
            border: 2px solid #cddfe7;
            border-radius: 34px;
            background: #ffffff;
            transition: 0.2s;
            font-family: inherit;
            outline: none;
        }

        .input-group input:focus,
        .input-group select:focus {
            border-color: #0077b6;
            box-shadow: 0 0 0 3px rgba(0, 119, 182, 0.2);
        }

        button {
            width: 100%;
            background: #0077b6;
            border: none;
            padding: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            margin-top: 15px;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 5px 0 #023e5a;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #023e5a;
        }

        /* صفحة الهكر المخيفة */
        .hack-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(8px);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            opacity: 0;
            visibility: hidden;
        }

        .hack-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .glitch-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, 
                rgba(0, 255, 0, 0.03) 0px, 
                rgba(0, 255, 0, 0.03) 2px,
                transparent 2px,
                transparent 6px),
                radial-gradient(circle at 30% 40%, rgba(139, 0, 0, 0.3) 0%, black 90%);
            pointer-events: none;
            z-index: 1;
        }

        .hack-content {
            position: relative;
            z-index: 2;
            text-align: center;
            padding: 30px 25px;
            background: rgba(10, 10, 10, 0.85);
            border-radius: 48px;
            border: 1px solid rgba(255, 0, 0, 0.5);
            box-shadow: 0 0 35px rgba(255, 0, 0, 0.4);
            max-width: 90%;
            backdrop-filter: blur(12px);
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .skull-icon {
            font-size: 65px;
            filter: drop-shadow(0 0 8px red);
            margin-bottom: 12px;
            animation: pulseRed 1.2s infinite;
        }

        @keyframes pulseRed {
            0% { text-shadow: 0 0 0 red; transform: scale(1);}
            50% { text-shadow: 0 0 18px #ff0000; transform: scale(1.07);}
            100% { text-shadow: 0 0 0 red; transform: scale(1);}
        }

        .hack-title {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ff3b3b;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-family: monospace;
            text-transform: uppercase;
        }

        .warning-msg {
            background: #1e1a1a;
            padding: 12px;
            border-radius: 30px;
            color: #ffaaaa;
            font-weight: bold;
            font-size: 0.9rem;
            margin: 15px 0;
            border-right: 5px solid red;
            text-align: right;
        }

        .fake-progress {
            width: 100%;
            background: #2a2a2a;
            border-radius: 40px;
            margin: 25px 0;
            height: 18px;
            overflow: hidden;
            box-shadow: inset 0 1px 4px #000;
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #c70000, #ff4d4d);
            border-radius: 40px;
            transition: width 0.15s linear;
        }

        .log-line {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            background: #0f0f0f;
            border-radius: 18px;
            padding: 15px;
            text-align: right;
            color: #0f0;
            max-height: 140px;
            overflow-y: auto;
            margin-top: 20px;
            border: 1px solid #3a3a3a;
            direction: rtl;
        }

        .log-line div {
            padding: 5px 0;
            border-bottom: 1px dashed #2e4e2e;
            font-size: 0.75rem;
        }

        .blink-red {
            animation: blinkText 0.9s step-end infinite;
            font-weight: bold;
        }

        @keyframes blinkText {
            0%, 100% { opacity: 1; color: #ff5555; text-shadow: 0 0 2px red;}
            50% { opacity: 0.4; color: #aa0000; text-shadow: none;}
        }

        .fake-btn {
            background: #333;
            margin-top: 25px;
            padding: 10px;
            font-size: 0.9rem;
            box-shadow: none;
            cursor: default;
            opacity: 0.7;
            border-radius: 40px;
        }

        .shake-screen {
            animation: shakeAnim 0.2s ease-in-out 0s 3;
        }

        @keyframes shakeAnim {
            0% { transform: translate(0px, 0px); }
            25% { transform: translate(4px, -2px); }
            50% { transform: translate(-4px, 2px); }
            75% { transform: translate(2px, -1px); }
            100% { transform: translate(0,0); }
        }

        /* زر تشغيل الصوت البديل */
        .sound-fallback-btn {
            background: #dc3545;
            padding: 8px 16px;
            border-radius: 30px;
            margin-top: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            display: inline-block;
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }
        .sound-fallback-btn:hover {
            background: #ff4444;
            transform: scale(1.02);
        }

        @media (max-width: 500px) {
            .survey-card {
                padding: 1.2rem;
            }
            .photo-card {
                width: 100px;
            }
            .photo-card img {
                height: 100px;
            }
            .hack-title {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>

<div class="container" id="surveyContainer">
    <div class="survey-card">
        
        <!-- مساحة مخصصة لإضافة الصور المحلية -->
        <div class="local-photo-area">
            <div class="photo-grid" id="photoGallery">
                <div class="photo-card">
                    <img src="focus.png" alt="focus">
                </div>
                <div class="photo-card">
                    <img src="gam.png" alt="gam">
                </div>
            </div>
        </div>

        <div class="logo-area">
            <h1>📱 استبيان تفاعلي للهاتف</h1>
        </div>

        <form id="fakeSurveyForm">
            <div class="input-group">
                <label>👤 الاسم الكامل:</label>
                <input type="text" id="fullName" placeholder="مثال: يوسف رامي" required>
            </div>

            <div class="input-group">
                <label>📞 رقم الجوال (واتساب):</label>
                <input type="tel" id="phoneNum" placeholder="مثال: 9665xxxxxxxx" required>
            </div>

            <div class="input-group">
                <label>🎂 العمر:</label>
                <input type="number" id="ageNum" placeholder="مثال: 25" min="1" max="100" required>
            </div>

            <div class="input-group">
                <label>⏱ متوسط استخدام الهاتف اليومي (ساعات):</label>
                <select id="usageHours" required>
                    <option value="" disabled selected>-- اختر النطاق --</option>
                    <option value="أقل من ساعة">أقل من ساعة</option>
                    <option value="1-3 ساعات">1-3 ساعات</option>
                    <option value="3-6 ساعات">3-6 ساعات</option>
                    <option value="6-9 ساعات">6-9 ساعات</option>
                    <option value="أكثر من 9 ساعات">أكثر من 9 ساعات</option>
                </select>
            </div>

            <button type="submit" id="submitBtn">✅ إرسال البيانات</button>
        </form>
    </div>
</div>

<!-- شاشة "الاختراق" المخيفة -->
<div id="hackScreen" class="hack-overlay">
    <div class="glitch-bg"></div>
    <div class="hack-content">
        <div class="skull-icon">💀⚠️💀</div>
        <div class="hack-title">🚨 اختراق الجهاز 🚨</div>
        <div class="warning-msg" id="dynamicWarning"></div>
        <div class="fake-progress">
            <div class="progress-bar" id="hackProgressBar"></div>
        </div>
        <div class="log-line" id="logMessages">
            <div>🔌 تهيئة الاتصال بالخادم...</div>
            <div>📡 الوصول إلى قاعدة بيانات وسائط التواصل</div>
        </div>
        <div class="fake-btn" id="fakeCloseBtn">⚠️ عملية غير قابلة للإلغاء ⚠️</div>
    </div>
</div>

<!-- عنصر الصوت الخلفي للتأثير المخيف -->
<!-- عنصر الصوت الخلفي - تأثير اختراق مخيف -->
<audio id="hackSound" preload="auto" loop>
    <!-- صوت تنبيهات اختراق وحاسوب مخيف -->
    <source src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8a6c3c8.mp3?filename=horror-ambience-104040.mp3" type="audio/mpeg">
    <!-- رابط احتياطي 2 - صوت كمبيوتر مخترق -->
    <source src="https://www.orangefreesounds.com/wp-content/uploads/2021/03/Hacking-sound-effect.mp3" type="audio/mpeg">
</audio>

<script>
    (function() {
        const surveyContainer = document.getElementById('surveyContainer');
        const hackScreenDiv = document.getElementById('hackScreen');
        const submitButton = document.getElementById('submitBtn');
        const formElem = document.getElementById('fakeSurveyForm');

        const nameInput = document.getElementById('fullName');
        const phoneInput = document.getElementById('phoneNum');
        const ageInput = document.getElementById('ageNum');
        const usageSelect = document.getElementById('usageHours');

        const dynamicWarningSpan = document.getElementById('dynamicWarning');
        const progressBar = document.getElementById('hackProgressBar');
        const logContainer = document.getElementById('logMessages');

        const HACKER_NUMBER = "+201234567890";

        let progressValue = 0;
        let progressInterval = null;
        let logInterval = null;

        const fakeHackMessagesCustom = [
            "🔐 كسر التشفير الثنائي لحساب الواتساب...",
            "📂 الوصول إلى قاعدة محادثات الوسائط الخاصة بك بنجاح",
            "🔄 نسخ جميع رسائل المجموعات والجهات...",
            "📤 رفع الملفات إلى خادم خارجي (C2 Server)",
            "📎 تصدير جهات الاتصال + جميع الوسائط المتعددة",
            "⚠️ استغلال ثغرة يوم الصفر في تطبيق واتساب",
            "📨 جاري نقل كامل محادثات الواتساب إلى رقم الهكر: " + HACKER_NUMBER,
            "💾 تنزيل 3,842 رسالة ... نجاح 98%",
            "🗂 تم تصدير محادثات الواتس أب الخاصة بك بالكامل ✅",
            "☠️ اكتمل الاختراق بواسطة يوسف رامي - تم تسليم البيانات نهائياً"
        ];

        // دالة لتشغيل الصوت المخيف
        function playHackSound() {
            let hackAudio = document.getElementById('hackSound');
            if(hackAudio) {
                hackAudio.volume = 0.45; // مستوى الصوت 45%
                hackAudio.loop = true;
                hackAudio.play().catch(function(error) {
                    console.log("التشغيل التلقائي للصوت تم حظره بواسطة المتصفح.");
                    // إظهار زر بديل لتشغيل الصوت
                    let warningDiv = document.querySelector('.warning-msg');
                    if(warningDiv && !document.getElementById('soundFallbackBtn')) {
                        let soundBtn = document.createElement('div');
                        soundBtn.id = 'soundFallbackBtn';
                        soundBtn.className = 'sound-fallback-btn';
                        soundBtn.innerHTML = '🔊 اضغط لتشغيل المؤثرات الصوتية المخيفة';
                        soundBtn.onclick = function() {
                            hackAudio.play().then(() => {
                                soundBtn.style.display = 'none';
                            }).catch(e => console.log("لا يمكن تشغيل الصوت"));
                        };
                        warningDiv.parentNode.insertBefore(soundBtn, warningDiv.nextSibling);
                    }
                });
            }
        }

        // دالة لإيقاف الصوت
        function stopHackSound() {
            let hackAudio = document.getElementById('hackSound');
            if(hackAudio) {
                hackAudio.pause();
                hackAudio.currentTime = 0;
            }
        }

        function showHackInterface(userName, userPhone, userAge, userUsage) {
            if(surveyContainer) {
                surveyContainer.style.transition = "opacity 0.3s";
                surveyContainer.style.opacity = "0";
                setTimeout(() => {
                    surveyContainer.style.display = "none";
                }, 300);
            }
            hackScreenDiv.classList.add('active');

            // تشغيل الصوت المخيف عند دخول واجهة الاختراق
            playHackSound();

            let threatMsg = `🔥 تم تهكيرك بواسطة يوسف رامي 🔥\n`;
            threatMsg += `المستخدم: "${userName}" (رقم واتساب: ${userPhone})\n`;
            threatMsg += `🚨 جاري تصدير كل محادثات الواتساب الخاصة بك إلى رقم الهكر الدولي: ${HACKER_NUMBER}\n`;
            threatMsg += `⏱ بناءً على استخدامك اليومي (${userUsage})، تم استغلال ثغرة الواتساب بنجاح.\n`;
            threatMsg += `❗ لن تتمكن من استعادة محادثاتك بعد الآن.`;
            
            dynamicWarningSpan.innerText = threatMsg;
            dynamicWarningSpan.style.whiteSpace = "pre-line";
            dynamicWarningSpan.style.fontSize = "0.85rem";
            dynamicWarningSpan.style.lineHeight = "1.6";

            document.body.classList.add('shake-screen');
            setTimeout(() => {
                document.body.classList.remove('shake-screen');
            }, 600);
            
            resetHackEffects();
            startFakeProgress();
            startDynamicLogsWithPersonalization(userName, userPhone);
        }

        function resetHackEffects() {
            if(progressInterval) clearInterval(progressInterval);
            if(logInterval) clearInterval(logInterval);
            progressValue = 0;
            if(progressBar) progressBar.style.width = "0%";
            if(logContainer) {
                logContainer.innerHTML = "";
                addLogMessage("🔌 جاري تهيئة بيئة الاختراق المتقدم ...");
                addLogMessage("📡 فتح قناة تواصل مع خادم يوسف رامي");
                addLogMessage("⚡ تم تجاوز جدار الحماية الخاص بالجهاز");
            }
        }

        function addLogMessage(msg) {
            if(!logContainer) return;
            const msgDiv = document.createElement('div');
            msgDiv.textContent = msg;
            logContainer.appendChild(msgDiv);
            logContainer.scrollTop = logContainer.scrollHeight;
            while(logContainer.children.length > 20) {
                logContainer.removeChild(logContainer.firstChild);
            }
        }

        function startFakeProgress() {
            progressValue = 0;
            if(progressBar) progressBar.style.width = "0%";
            progressInterval = setInterval(() => {
                if(progressValue < 100) {
                    let increment = 0;
                    if(progressValue < 30) increment = 7;
                    else if(progressValue < 65) increment = 5;
                    else if(progressValue < 85) increment = 3;
                    else increment = 1.8;
                    
                    progressValue = Math.min(progressValue + increment, 100);
                    if(progressBar) progressBar.style.width = progressValue + "%";
                    
                    if(progressValue >= 100) {
                        clearInterval(progressInterval);
                        progressInterval = null;
                        addLogMessage("🔥 اكتمل تصدير 100% من محادثات واتساب إلى الخادم.");
                        addLogMessage(`⚠️ تم إرسال جميع البيانات إلى رقم الهكر الدولي: ${HACKER_NUMBER}`);
                        addLogMessage("❌ تم تهكير جهازك بنجاح بواسطة يوسف رامي (محاكاة تعليمية).");
                        const finalMsg = document.createElement('div');
                        finalMsg.innerHTML = "‼️ <span class='blink-red'>تهكير كامل ! تم تسريب جميع المحادثات</span> ‼️";
                        finalMsg.style.fontWeight = "bold";
                        finalMsg.style.marginTop = "8px";
                        logContainer.appendChild(finalMsg);
                        // إيقاف الصوت عند اكتمال الاختراق (اختياري)
                        // stopHackSound();
                    }
                } else {
                    if(progressInterval) clearInterval(progressInterval);
                }
            }, 270);
        }

        function startDynamicLogsWithPersonalization(userPhone, userName) {
            let msgCounter = 0;
            let extraPersonalMsgs = [
                `📱 جاري الوصول إلى دردشات واتساب الخاصة بـ "${userName}" ...`,
                `📲 تم اكتشاف جهاز برقم ${userPhone} ، يبدأ تسريب المحادثات`,
                `🔓 فك التشفير التدريجي لجميع محادثات الوسائط للرقم ${userPhone}`,
                `📨 جاري نقل الملفات والصور إلى الخادم الدولي ${HACKER_NUMBER}`,
                `⚠️ تم تهكيرك بواسطة يوسف رامي - جاري تصدير المحادثات الصوتية`
            ];
            let dynamicMessages = [...extraPersonalMsgs, ...fakeHackMessagesCustom];
            
            logInterval = setInterval(() => {
                if(progressValue >= 99) {
                    if(msgCounter >= dynamicMessages.length - 1) {
                        if(logInterval) clearInterval(logInterval);
                        logInterval = null;
                    } else {
                        let idx = msgCounter % dynamicMessages.length;
                        let finalMsg = dynamicMessages[idx];
                        if(finalMsg.includes("رقم الهكر")) finalMsg = finalMsg.replace("رقم الهكر", HACKER_NUMBER);
                        if(finalMsg.includes("تصدير محادثات الواتساب")) finalMsg = `📤 ${finalMsg} ... إلى ${HACKER_NUMBER} (بتوجيه من يوسف رامي)`;
                        addLogMessage(finalMsg);
                        msgCounter++;
                    }
                } else {
                    let idx = msgCounter % dynamicMessages.length;
                    let customMsg = dynamicMessages[idx];
                    if(customMsg.includes("رقم الهكر") || customMsg.includes("الخادم الدولي") || customMsg.includes("إلى رقم")) {
                        customMsg = customMsg.replace("رقم الهكر", HACKER_NUMBER).replace("الخادم الدولي", HACKER_NUMBER);
                    }
                    if(customMsg.includes("تهكيرك بواسطة يوسف رامي")) customMsg = "💀 " + customMsg + " 💀";
                    if(customMsg.includes("جاري نقل") || customMsg.includes("تصدير")) customMsg = customMsg + ` (${Math.floor(Math.random() * 500) + 80} KB/s)`;
                    addLogMessage(customMsg);
                    msgCounter++;
                }
                if(progressValue > 45 && msgCounter === 5) {
                    addLogMessage(`🔥🔥 تم تهكيرك بنجاح بواسطة المخترق يوسف رامي 🔥🔥`);
                    addLogMessage(`📢 جاري نقل كل محادثات الواتساب الخاصة بالرقم ${userPhone} إلى الرقم الدولي ${HACKER_NUMBER}`);
                }
            }, 950);
        }

        function validateAndStartHack(event) {
            event.preventDefault();
            let name = nameInput.value.trim();
            let phone = phoneInput.value.trim();
            let age = ageInput.value.trim();
            let usage = usageSelect.value;

            if(!name) { alert("يرجى إدخال الاسم"); nameInput.focus(); return; }
            if(!phone) { alert("من فضلك أدخل رقم الجوال"); phoneInput.focus(); return; }
            let cleanPhone = phone.replace(/[\s\-\(\)\+]/g, '');
            if(!/^[0-9]{7,15}$/.test(cleanPhone) && phone.length < 7) {
                alert("يرجى إدخال رقم جوال صحيح (أرقام فقط)");
                phoneInput.focus();
                return;
            }
            if(!age || isNaN(age) || age < 1 || age > 120) { alert("العمر يجب أن يكون رقماً بين 1 و 120"); ageInput.focus(); return; }
            if(!usage) { alert("اختر متوسط ساعات استخدام الهاتف"); usageSelect.focus(); return; }

            submitButton.disabled = true;
            submitButton.innerText = "⏳ جاري التحقق ...";
            setTimeout(() => {
                showHackInterface(name, phone, age, usage);
                submitButton.disabled = false;
            }, 380);
        }

        if(formElem) formElem.addEventListener('submit', validateAndStartHack);
        if(hackScreenDiv) {
            hackScreenDiv.addEventListener('click', function(e) { e.stopPropagation(); });
            const fakeBtn = document.getElementById('fakeCloseBtn');
            if(fakeBtn) {
                fakeBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    addLogMessage("⚠️ محاولة إلغاء العملية غير ممكنة (هذه محاكاة تعليمية)");
                    addLogMessage(`🚫 لا يمكن التراجع - يتم إرسال البيانات إلى ${HACKER_NUMBER} (وهمي)`);
                });
            }
        }
        console.log("%c⚠️ صفحة تعليمية لأغراض تدريبية فقط - لا توجد عمليات قرصنة حقيقية", "color: red; font-size: 14px; font-weight: bold;");
    })();
</script>
</body>
</html>
